# diagnostic_aggregator config: groups the topic_monitor time-sync statuses
# (published on /diagnostics with names like "timesync: /topic") into a
# "Time Sync" category on /diagnostics_agg, which rqt_robot_monitor displays.
/**:
  ros__parameters:
    path: BlueROV
    pub_rate: 1.0
    analyzers:
      timesync:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Time Sync
        startswith: ['timesync']
