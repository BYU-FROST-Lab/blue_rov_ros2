# diagnostic_aggregator config: groups statuses published on /diagnostics into
# categories on /diagnostics_agg, which rqt_robot_monitor displays.
#   - topic_monitor time-sync statuses ("timesync: /topic")  -> "Time Sync"
#   - sbg_diagnostics SBG statuses      ("sbg: ...")          -> "SBG"
/**:
  ros__parameters:
    path: BlueROV
    pub_rate: 1.0
    analyzers:
      timesync:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Time Sync
        startswith: ['timesync']
      sbg:
        type: diagnostic_aggregator/GenericAnalyzer
        path: SBG
        startswith: ['sbg']
