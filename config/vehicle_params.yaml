# VEHICLE-SPECIFIC ROS PARAMETER VALUES

/**:
  ros__parameters:
    # water_salinity_ppt: 0.0 # 0.0 for fresh water, 35.0 for salt water
    # magnetic_declination: 10.7 # E is positive, W is negative, 10.70° E for Utah Lake
    # https://www.ngdc.noaa.gov/geomag/calculators/magcalc.shtml?

    vehicle_ID: 3
    # origin:
    #   latitude: 40.238833
    #   longitude: -111.742249
    #   altitude: 1367.00
    origin:
      latitude: 40.137388
      longitude: -111.029430
      altitude: 2318.0

/**/pressure_pub:
  ros__parameters:
    publish_frequency: 20.0 # max 20 Hz for MS5837
    frame_id: 'bluerov2/depth_link'


/**/depth_converter:
  ros__parameters:
    fluid_density: 997.0
    use_salinity_model: false
    water_salinity_ppt: 35.0
    fluid_pressure_atm: 87250.0
    min_calibration_samples: 500
    calibration_timeout_s: 30.0
    calibration_max_variance: 30.0
    calibration_max_offset: 40000.0
    default_depth_variance: 0.5
    use_calibration_variance: true
    calibrate_on_startup: true
    map_frame: 'map'

bluerov2: # Change this to match the vehicle name

  gps_odom:
    ros__parameters:
      frame_id: bluerov2/gps_link

  shallow:
    pressure_pub:
      ros__parameters:
        sensor_type: 0
        i2c_bus: 1

  deep:
    pressure_pub:
      ros__parameters:
        sensor_type: 1
        i2c_bus: 0


    depth_converter:
      ros__parameters:
        calibration_max_variance: 900.0

  vehicle_pinger:
    ros__parameters:
      enable_ping: false
      ping_frequency_seconds: 4
      vehicles_in_mission: [1,2,15]


  imu_odom_anchor:
    ros__parameters:
      local_odom_topic: imu/odom
      global_odom_topic: gps/odom

      map_frame: map
      odom_frame: bluerov2/imu_odom
      child_frame: bluerov2/imu_link

      max_position_variance: 2.0     # meters^2
      max_yaw_variance: 0.3          # rad^2
  
  dvl_odom_anchor:
    ros__parameters:
      local_odom_topic: dvl/odom
      global_odom_topic: gps/odom

      map_frame: map
      odom_frame: bluerov2/dvl_odom
      child_frame: bluerov2/dvl_link

      max_position_variance: 2.0     # meters^2
      max_yaw_variance: 0.3          # rad^2

  odom_to_navsat:
    ros__parameters:
      odom_topic: imu/odom
      output_topic: imu/fix

  dvl_to_navsat:
    ros__parameters:
      odom_topic: dvl/odom
      output_topic: dvl/fix
  
  ekf_filter_node_map:
    ros__parameters:
      frequency: 30.0
      two_d_mode: false
      publish_tf: false  # map to dvl_odom. but it needs the transform to base link... ughhh
      print_diagnostics: false
      map_frame: map
      odom_frame: bluerov2/dvl_odom
      base_link_frame: bluerov2/base_link
      world_frame: map

      odom0: dvl/odom
      odom0_config: [true, true, true, # X, Y, Z
                      false, false, false, # Roll, Pitch, Yaw
                      false,  false,  false,  # Vx, Vy, Vz
                      false,  false,  false,  # Vroll, Vpitch, Vyaw
                      false, false, false] # Ax, Ay, Az
      odom0_queue_size: 10
      odom0_differential: true
      odom0_relative: false

      odom1: shallow/depth/odom
      odom1_config: [false, false, true,  # X, Y, Z
                      false, false, false, # Roll, Pitch, Yaw
                      false, false, false, # Vx, Vy, Vz
                      false, false, false, # Vroll, Vpitch, Vyaw
                      false, false, false] # Ax, Ay, Az
      odom1_queue_size: 5
      odom1_differential: false
      odom1_relative: false # Absolute depth in the map frame.

      odom2: gps/odom
      odom2_config: [true,  true,  false, # X, Y, Z  
                      false, false, false, # Roll, Pitch, Yaw
                      false, false, false, # Vx, Vy, Vz
                      false, false, false, # Vroll, Vpitch, Vyaw
                      false, false, false] # Ax, Ay, Az
      odom2_queue_size: 5
      odom2_differential: false
      odom2_relative: false # Absolute GPS position in the map frame.

      imu0: imu/data
      imu0_config: [false, false, false, # X, Y, Z
                    true,  true,  true,  # Roll, Pitch, Yaw
                    false, false, false, # Vx, Vy, Vz
                    false, false, false, # Vroll, Vpitch, Vyaw
                    false, false, false] # Ax, Ay, Az
      imu0_queue_size: 15
      imu0_differential: false
      imu0_relative: false # Absolute orientation in the map frame.

  

    # modem_ros_node:
    #   ros__parameters:
    #     seatrac_serial_port: "/dev/frost/rs232_connector_seatrac" # TODO fix the port with the SBG plugged in

    # nmea_converter:
