# List the name of the topic with the corresponding topic type
# Ex.   - name: /topic
#         type: topic/type
#         sample_every_n: 10   # optional: only deserialize the header every 10th msg
#         qos: { reliability: best_effort }   # optional: match the publisher's QoS

# Below is a list of all of the topic types accepted up to this point.
#   - nav_msgs/msg/Odometry
#   - sensor_msgs/msg/Image
#   - sensor_msgs/msg/Imu
#   - sensor_msgs/msg/NavSatFix
#   - sensor_msgs/msg/PointCloud2

# Notes:
#   Time sync status is referenced to the first topic received by the callback function.
#   For large/high-rate topics (PointCloud2, Image), set 'sample_every_n' to avoid
#   deserializing every full message just to read its header; counting, rate, and
#   staleness stay exact since they don't require deserialization.
#   Example:
#     - name: /bluerov2/sonar/points
#       type: sensor_msgs/msg/PointCloud2
#       sample_every_n: 10
#       qos: { reliability: best_effort }
topics:
  # Inertial Sense IMU/GPS
  - name: /bluerov2/imu/data
    type: sensor_msgs/msg/Imu

  # Ouster LiDARs
  # - name: /points
  #   type: sensor_msgs/msg/PointCloud2
  #   sample_every_n: 10

  # - name: /imu
  #   type: sensor_msgs/msg/Imu

  # # Cameras
  # - name: /camera/image_raw
  #   type: sensor_msgs/msg/Image

  # Emlid RTK GPS
  - name: /bluerov2/imu/nav_sat_fix
    type: sensor_msgs/msg/NavSatFix

  - name: /bluerov2/imu/mag
    type: sensor_msgs/msg/MagneticField

  # TODO add MAG

  - name: /bluerov2/dvl/twist
    type: geometry_msgs/msg/TwistWithCovarianceStamped
  
  - name: /bluerov2/deep/depth/odom
    type: nav_msgs/msg/Odometry

  - name: /bluerov2/shallow/depth/odom
    type: nav_msgs/msg/Odometry

  - name: /bluerov2/dvl/odom
    type: nav_msgs/msg/Odometry

  # - name: /mavros/imu/data
  #   type: sensor_msgs/msg/Imu
  #   qos:
  #     history_depth: 10
  #     reliability: best_effort
  #     durability: volatile

  - name: /bluerov2/deep/pressure/data
    type: sensor_msgs/msg/FluidPressure

  - name: /bluerov2/battery/status
    type: sensor_msgs/msg/BatteryState